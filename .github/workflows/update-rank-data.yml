name: Update Addon Rank Data

on:
  schedule:
    # Every Sunday at 06:30 UTC — after the Vercel solo-queue-cron (06:00 UTC) has
    # written fresh cutoffs to Redis, so generate-rank-data.mjs gets the same data
    # the web app uses and addon/web percentile mapping stays in sync.
    - cron: '30 6 * * 0'
  workflow_dispatch:
    inputs:
      season:
        description: 'Raider.io season slug'
        default: ''
        required: false
      region:
        description: 'Region (world / us / eu / kr / tw)'
        default: 'world'
        required: false
      force_release:
        description: 'Create a release even if rank data is unchanged'
        type: boolean
        default: false
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate RankData.lua
        run: |
          for attempt in 1 2 3; do
            node scripts/generate-rank-data.mjs \
              "${{ github.event.inputs.season }}" \
              "${{ github.event.inputs.region || 'world' }}" && break
            echo "Attempt $attempt failed — retrying in 30s…"
            [ $attempt -lt 3 ] && sleep 30
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet addon/TankMeLater/RankData.lua; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump .toc version and commit
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          sed -i "s/^## Version: .*/## Version: ${TODAY}/" \
            addon/TankMeLater/TankMeLater.toc
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addon/TankMeLater/RankData.lua \
                  addon/TankMeLater/TankMeLater.toc
          if ! git diff --cached --quiet; then
            git commit -m "chore: update addon rank data ${TODAY}"
            git push
          fi

      - name: Package addon zip
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        env:
          FORCE_RELEASE: ${{ github.event.inputs.force_release }}
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          if [ "$FORCE_RELEASE" = "true" ]; then
            ADDON_VERSION="${TODAY}-build.${{ github.run_number }}"
          else
            ADDON_VERSION="${TODAY}"
          fi
          mkdir -p dist
          zip -r "dist/TankMeLater-${ADDON_VERSION}.zip" addon/TankMeLater/
          echo "ADDON_ZIP=dist/TankMeLater-${ADDON_VERSION}.zip" >> "$GITHUB_ENV"
          echo "ADDON_VERSION=${ADDON_VERSION}"                   >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "addon-${{ env.ADDON_VERSION }}"
          name: "TankMeLater ${{ env.ADDON_VERSION }}"
          body: |
            Weekly rank data update — season auto-detected from live Raider.io data.

            Install by extracting `TankMeLater/` into your `Interface/AddOns/` folder.
          files: ${{ env.ADDON_ZIP }}

      - name: Upload to CurseForge
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
        run: |
          if [ -z "$CF_API_KEY" ] || [ -z "$CF_PROJECT_ID" ]; then
            echo "CF_API_KEY or CF_PROJECT_ID not set — skipping CurseForge upload"
            exit 0
          fi

          # Convert TOC interface number to version string (e.g. 120005 → 12.0.5)
          INTERFACE_VER=$(grep "^## Interface:" addon/TankMeLater/TankMeLater.toc | awk '{print $NF}')
          MAJOR=$((INTERFACE_VER / 10000))
          MINOR=$(( (INTERFACE_VER % 10000) / 100 ))
          PATCH=$((INTERFACE_VER % 100))
          VERSION_STR="${MAJOR}.${MINOR}.${PATCH}"

          # Resolve the CurseForge internal game version ID (gameVersionTypeID 517 = retail WoW)
          CF_VERSIONS=$(curl -sf "https://wow.curseforge.com/api/game/versions" \
            -H "X-Api-Token: ${CF_API_KEY}")
          CF_VERSION_ID=$(echo "$CF_VERSIONS" | jq -r \
            ".[] | select(.name == \"${VERSION_STR}\" and .gameVersionTypeID == 517) | .id" | head -1)

          if [ -z "$CF_VERSION_ID" ]; then
            echo "Could not find CurseForge game version for ${VERSION_STR} — skipping upload"
            exit 1
          fi

          echo "Uploading ${ADDON_ZIP} for WoW ${VERSION_STR} (CF version ID: ${CF_VERSION_ID})"
          curl -sf -X POST \
            "https://wow.curseforge.com/api/projects/${CF_PROJECT_ID}/upload-file" \
            -H "X-Api-Token: ${CF_API_KEY}" \
            -F "metadata={\"changelog\":\"Weekly rank data update for ${ADDON_VERSION}.\",\"changelogType\":\"text\",\"gameVersions\":[${CF_VERSION_ID}],\"releaseType\":\"release\"}" \
            -F "file=@${ADDON_ZIP}"
