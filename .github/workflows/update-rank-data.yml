name: Update Addon Rank Data

on:
  schedule:
    # Every Sunday at 06:00 UTC — shortly after Raider.io updates weekly cutoffs.
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      season:
        description: 'Raider.io season slug'
        default: ''
        required: false
      region:
        description: 'Region (world / us / eu / kr / tw)'
        default: 'world'
        required: false
      force_release:
        description: 'Create a release even if rank data is unchanged'
        type: boolean
        default: false
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate RankData.lua
        run: |
          for attempt in 1 2 3; do
            node scripts/generate-rank-data.mjs \
              "${{ github.event.inputs.season }}" \
              "${{ github.event.inputs.region || 'world' }}" && break
            echo "Attempt $attempt failed — retrying in 30s…"
            [ $attempt -lt 3 ] && sleep 30
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet addon/TankMeLater/RankData.lua; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump .toc version and commit
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          sed -i "s/^## Version: .*/## Version: ${TODAY}/" \
            addon/TankMeLater/TankMeLater.toc
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addon/TankMeLater/RankData.lua \
                  addon/TankMeLater/TankMeLater.toc
          if ! git diff --cached --quiet; then
            git commit -m "chore: update addon rank data ${TODAY}"
            git push
          fi

      - name: Package addon zip
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        env:
          FORCE_RELEASE: ${{ github.event.inputs.force_release }}
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          if [ "$FORCE_RELEASE" = "true" ]; then
            ADDON_VERSION="${TODAY}-build.${{ github.run_number }}"
          else
            ADDON_VERSION="${TODAY}"
          fi
          mkdir -p dist
          zip -r "dist/TankMeLater-${ADDON_VERSION}.zip" addon/TankMeLater/
          echo "ADDON_ZIP=dist/TankMeLater-${ADDON_VERSION}.zip" >> "$GITHUB_ENV"
          echo "ADDON_VERSION=${ADDON_VERSION}"                   >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "addon-${{ env.ADDON_VERSION }}"
          name: "TankMeLater ${{ env.ADDON_VERSION }}"
          body: |
            Weekly rank data update — season auto-detected from live Raider.io data.

            Install by extracting `TankMeLater/` into your `Interface/AddOns/` folder.
          files: ${{ env.ADDON_ZIP }}
